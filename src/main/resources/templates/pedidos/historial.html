<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial - Panadería Tu Pan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Panadería Tu Pan | <span th:text="${username}">Usuario</span> <span th:if="${isAdmin}">(Admin)</span></a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/productos/menu}">Ver Menú</a>
            <a class="nav-link" th:href="@{/pedidos/nuevo}">Hacer Pedido</a>
            <a class="nav-link active" th:href="@{/pedidos/historial}">Historial</a>
            <form th:action="@{/logout}" method="post"><button type="submit" class="btn btn-outline-danger btn-sm">Salir</button></form>
        </div>
    </div>
</nav>
<div class="container">
    <table class="table table-striped">
        <thead class="table-dark"><tr><th>Cliente</th><th>Producto</th><th>Total</th><th>Acciones</th></tr></thead>
        <tbody>
        <tr th:each="pedido : ${pedidos}">
            <td th:text="${pedido.nombreCliente}"></td>
            <td th:text="${pedido.producto != null ? pedido.producto.nombre : 'N/A'}"></td>
            <td th:text="${pedido.total}"></td>
            <td><form th:action="@{/pedidos/eliminar/{id}(id=${pedido.id})}" method="post"><button class="btn btn-danger btn-sm">X</button></form></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
