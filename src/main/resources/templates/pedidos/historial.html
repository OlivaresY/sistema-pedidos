<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Pedidos - Panadería Tu Pan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Panadería Tu Pan</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/productos/menu}">Ver Menú</a>
            <a class="nav-link" th:href="@{/pedidos/nuevo}">Hacer Pedido</a>
            <a class="nav-link active" th:href="@{/pedidos/historial}">Historial de Pedidos</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Historial de Pedidos</h2>

    <div th:if="${pedidos.isEmpty()}" class="alert alert-info">
        No hay pedidos registrados en este momento.
    </div>

    <table th:if="${!pedidos.isEmpty()}" class="table table-striped table-bordered table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Producto</th>
            <th>Total</th>
            <th>Estado</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="pedido : ${pedidos}">
            <td th:text="${pedido.id}"></td>
            <td th:text="${pedido.nombreCliente}"></td>

            <td th:text="${pedido.producto != null ? pedido.producto.nombre : 'Producto no disponible'}"></td>

            <td th:text="'₡' + ${#numbers.formatDecimal(pedido.total, 1, 2)}"></td>

            <td>
                <span class="badge bg-primary" th:text="${pedido.estado}"></span>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
