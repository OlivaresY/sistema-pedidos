<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Pedido - Panadería Tu Pan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Panadería Tu Pan</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/productos/menu}">Ver Menú</a>
            <a class="nav-link active" th:href="@{/pedidos/nuevo}">Hacer Pedido</a>
            <a class="nav-link" th:href="@{/pedidos/historial}">Historial de Pedidos</a>
        </div>
    </div>
</nav>

<div class="container">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>Realizar Pedido</h3>
        </div>

        <div class="card-body">

            <form th:action="@{/pedidos/guardar}" method="post">

                <div class="mb-3">
                    <label class="form-label">Nombre del Cliente</label>
                    <input type="text"
                           class="form-control"
                           name="nombreCliente"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Producto</label>

                    <select class="form-select"
                            name="producto.id"
                            required>

                        <option value="">Seleccione un producto</option>

                        <option th:each="prod : ${productos}"
                                th:value="${prod.id}"
                                th:text="${prod.nombre}">
                        </option>

                    </select>
                </div>

                <button type="submit"
                        class="btn btn-success">
                    Crear Pedido
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
