<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Pedido - Panadería Tu Pan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Panadería Tu Pan | <span th:text="${username}">Usuario</span> <span th:if="${isAdmin}">(Admin)</span></a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/productos/menu}">Ver Menú</a>
            <a class="nav-link active" th:href="@{/pedidos/nuevo}">Hacer Pedido</a>
            <a class="nav-link" th:href="@{/pedidos/historial}">Historial</a>
            <form th:action="@{/logout}" method="post"><button type="submit" class="btn btn-outline-danger btn-sm">Salir</button></form>
        </div>
    </div>
</nav>
<div class="container">
    <div class="card shadow p-4">
        <h3>Realizar Pedido</h3>
        <form th:action="@{/pedidos/guardar}" th:object="${pedido}" method="post">
            <div class="mb-3">
                <label>Nombre del Cliente</label>
                <input type="text" class="form-control" th:field="*{nombreCliente}" th:readonly="${!isAdmin}" required>
            </div>
            <div class="mb-3">
                <label>Producto</label>
                <select class="form-select" name="productoId" id="productoId" required>
                    <option value="" disabled selected>Seleccione un producto...</option>
                    <option th:each="prod : ${productos}"
                            th:value="${prod.id}"
                            th:text="${prod.nombre}"></option>
                </select>
                <div class="text-danger mt-1" th:if="${errorProducto}" th:text="${errorProducto}"></div>
            </div>
            <button type="submit" class="btn btn-success">Crear Pedido</button>
        </form>
    </div>
</div>
</body>
</html>
