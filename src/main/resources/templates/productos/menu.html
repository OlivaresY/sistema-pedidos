<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú - Panadería Tu Pan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Panadería Tu Pan | <span th:text="${username}">Usuario</span> <span th:if="${isAdmin}">(Admin)</span></a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" th:href="@{/productos/menu}">Ver Menú</a>
            <a class="nav-link" th:href="@{/pedidos/nuevo}">Hacer Pedido</a>
            <a class="nav-link" th:href="@{/pedidos/historial}">Historial</a>
            <form th:action="@{/logout}" method="post"><button type="submit" class="btn btn-outline-danger btn-sm">Salir</button></form>
        </div>
    </div>
</nav>
<div class="container">
    <div class="row">
        <div class="col-md-4" th:each="prod : ${productos}">
            <div class="card mb-3"><div class="card-body"><h5 th:text="${prod.nombre}"></h5><p th:text="${prod.precio}"></p></div></div>
        </div>
    </div>
</div>
</body>
</html>
