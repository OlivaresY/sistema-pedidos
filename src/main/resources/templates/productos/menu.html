<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú - Panadería Tu Pan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Panadería Tu Pan</a>
            <div class="navbar-nav">
                <a class="nav-link active" th:href="@{/productos/menu}">Ver Menú</a>
                <a class="nav-link" th:href="@{/pedidos/nuevo}">Hacer Pedido</a>
                <a class="nav-link" th:href="@{/pedidos/historial}">Historial de Pedidos</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4 text-center text-primary fw-bold">Nuestro Menú Tradicional</h1>

        <div class="row">
            <div class="col-md-4 mb-4" th:each="prod : ${productos}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-success fw-bold" th:text="${prod.nombre}">Nombre del Pan</h5>
                        <p class="card-text text-muted" th:text="${prod.description}">Descripción corta</p>

                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="fw-bold fs-5 text-dark" th:text="'₡' + ${prod.precio}">'₡'0.00</span>

                            <span th:if="${prod.disponible}" class="badge bg-success">Disponible</span>
                            <span th:unless="${prod.disponible}" class="badge bg-danger">Agotado</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
